server {
    listen 80;
    server_name _;

    # CORS headers (added to every response)
    add_header Access-Control-Allow-Origin  "*" always;
    add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS" always;
    add_header Access-Control-Allow-Headers "Authorization, Content-Type, Accept, RqUID, X-Request-ID, X-Session-ID, X-Client-ID" always;

    # Preflight requests
    if ($request_method = OPTIONS) {
        return 204;
    }

    # OAuth: /api/v2/oauth -> ngw.devices.sberbank.ru:9443
    location /api/v2/ {
        proxy_pass         https://ngw.devices.sberbank.ru:9443/api/v2/;
        proxy_ssl_verify   off;
        proxy_set_header   Host ngw.devices.sberbank.ru;
        proxy_set_header   X-Real-IP $remote_addr;
    }

    # GigaChat API: /api/v1/* -> gigachat.devices.sberbank.ru
    location /api/v1/ {
        proxy_pass         https://gigachat.devices.sberbank.ru/api/v1/;
        proxy_ssl_verify   off;
        proxy_set_header   Host gigachat.devices.sberbank.ru;
        proxy_set_header   X-Real-IP $remote_addr;

        # SSE streaming support
        proxy_buffering    off;
        proxy_cache        off;
        proxy_read_timeout 300s;
    }

    # Health check
    location /health {
        return 200 '{"status":"ok"}';
        add_header Content-Type application/json;
    }
}
